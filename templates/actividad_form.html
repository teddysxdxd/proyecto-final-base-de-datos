{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h4><i class="fas fa-tasks"></i> {{ titulo }}</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cliente *</label>
                    <select name="cliente_id" class="form-control" required>
                        {% for c in clientes %}
                        <option value="{{ c.cliente_id }}">{{ c.nombre_comercial }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Oportunidad (opcional)</label>
                    <select name="oportunidad_id" class="form-control">
                        <option value="">-- Sin oportunidad --</option>
                        {% for o in oportunidades %}
                        <option value="{{ o.oportunidad_id }}">{{ o.nombre_oportunidad }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Responsable *</label>
                    <select name="empleado_responsable_id" class="form-control" required>
                        {% for e in empleados %}
                        <option value="{{ e.empleado_id }}">{{ e.nombre }} {{ e.apellido }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tipo Actividad *</label>
                    <select name="tipo_actividad_id" class="form-control" required id="tipoActividad">
                        {% for t in tipos %}
                        <option value="{{ t.tipo_actividad_id }}">{{ t.nombre_tipo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Asunto *</label>
                    <input type="text" name="asunto" class="form-control" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Fecha *</label>
                    <input type="date" name="fecha" class="form-control" value="{{ datetime.now().strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Hora Inicio</label>
                    <input type="time" name="hora_inicio" class="form-control">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Hora Fin</label>
                    <input type="time" name="hora_fin" class="form-control">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Prioridad</label>
                    <select name="prioridad" class="form-control">
                        <option value="Alto">Alto</option>
                        <option value="Normal" selected>Normal</option>
                        <option value="Bajo">Bajo</option>
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Comentario</label>
                    <textarea name="comentario" class="form-control" rows="3"></textarea>
                </div>
                
                <!-- Campos para Reunión (se muestran solo si se selecciona Reunión) -->
                <div id="reunionFields" style="display: none;">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Calle</label>
                        <input type="text" name="calle" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ciudad</label>
                        <input type="text" name="ciudad" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Sala</label>
                        <input type="text" name="sala" class="form-control">
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{{ url_for('actividades') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('tipoActividad').addEventListener('change', function() {
    var tipo = this.options[this.selectedIndex].text;
    var reunionFields = document.getElementById('reunionFields');
    if (tipo === 'Reunión') {
        reunionFields.style.display = 'flex';
        reunionFields.style.flexWrap = 'wrap';
    } else {
        reunionFields.style.display = 'none';
    }
});
</script>
{% endblock %}
