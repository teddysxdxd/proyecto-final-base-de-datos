{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h4><i class="fas fa-user-plus"></i> {{ titulo }}</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre Comercial *</label>
                    <input type="text" name="nombre_comercial" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Razón Social</label>
                    <input type="text" name="razon_social" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="direccion_empresa" class="form-control">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Celular</label>
                    <input type="text" name="celular" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email Empresa</label>
                    <input type="email" name="email_empresa" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Nombre Contacto</label>
                    <input type="text" name="contacto_nombre" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Teléfono Contacto</label>
                    <input type="text" name="contacto_telefono" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">División *</label>
                    <select name="division_id" class="form-control" required>
                        {% for d in divisiones %}
                        <option value="{{ d.division_id }}">{{ d.nombre_division }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{{ url_for('clientes') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
