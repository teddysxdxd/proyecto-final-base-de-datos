{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h4><i class="fas fa-chart-line"></i> {{ titulo }}</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre Oportunidad *</label>
                    <input type="text" name="nombre_oportunidad" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tipo Oportunidad *</label>
                    <select name="tipo_oportunidad_id" class="form-control" required>
                        {% for t in tipos %}
                        <option value="{{ t.tipo_oportunidad_id }}">{{ t.nombre_tipo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cliente *</label>
                    <select name="cliente_id" class="form-control" required>
                        {% for c in clientes %}
                        <option value="{{ c.cliente_id }}">{{ c.nombre_comercial }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Asistente Comercial *</label>
                    <select name="empleado_asignado_id" class="form-control" required>
                        {% for a in asistentes %}
                        <option value="{{ a.empleado_id }}">{{ a.nombre }} {{ a.apellido }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gerente Comercial *</label>
                    <select name="gerente_comercial_id" class="form-control" required>
                        {% for g in gerentes %}
                        <option value="{{ g.empleado_id }}">{{ g.nombre }} {{ g.apellido }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Etapa Actual *</label>
                    <select name="etapa_actual_id" class="form-control" required>
                        {% for e in etapas %}
                        <option value="{{ e.etapa_id }}">{{ e.nombre_etapa }} ({{ e.porcentaje_cierre }}%)</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Fecha Inicio *</label>
                   <input type="date" name="fecha_inicio" value="{{ '' }}">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Fecha Cierre Planificada *</label>
                    <input type="date" name="fecha_cierre_planificada" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Monto Potencial (Q) *</label>
                    <input type="number" step="0.01" name="monto_potencial" class="form-control" required>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{{ url_for('oportunidades') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
