{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block extra_css %}
<style>
    .oportunidad-card {
        max-width: 1100px;
        margin: 0 auto;
        border: none;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }
    .oportunidad-card .card-header {
        border-radius: 12px 12px 0 0;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: #fff;
    }
    .oportunidad-card .card-body {
        padding: 1.5rem;
    }
</style>
{% endblock %}
{% block content %}
<div class="card oportunidad-card">
    <div class="card-header py-3">
        <h4 class="mb-0"><i class="fas fa-chart-line"></i> {{ titulo }}</h4>
    </div>
    <div class="card-body">
        <form method="POST" class="needs-validation" novalidate>
            <div class="row g-3">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre Oportunidad *</label>
                    <input type="text" name="nombre_oportunidad" class="form-control" value="{{ form_data.get('nombre_oportunidad', '') if form_data else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tipo Oportunidad *</label>
                    <select name="tipo_oportunidad_id" class="form-control" required>
                        {% for t in tipos %}
                        <option value="{{ t.tipo_oportunidad_id }}" {% if form_data and form_data.get('tipo_oportunidad_id') == (t.tipo_oportunidad_id|string) %}selected{% endif %}>{{ t.nombre_tipo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cliente *</label>
                    <select name="cliente_id" class="form-control" required>
                        {% for c in clientes %}
                        <option value="{{ c.cliente_id }}" {% if form_data and form_data.get('cliente_id') == (c.cliente_id|string) %}selected{% endif %}>{{ c.nombre_comercial }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Asistente Comercial *</label>
                    <select name="empleado_asignado_id" class="form-control" required>
                        {% for a in asistentes %}
                        <option value="{{ a.empleado_id }}" {% if form_data and form_data.get('empleado_asignado_id') == (a.empleado_id|string) %}selected{% endif %}>{{ a.nombre }} {{ a.apellido }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gerente Comercial *</label>
                    <select name="gerente_comercial_id" class="form-control" required>
                        {% for g in gerentes %}
                        <option value="{{ g.empleado_id }}" {% if form_data and form_data.get('gerente_comercial_id') == (g.empleado_id|string) %}selected{% endif %}>{{ g.nombre }} {{ g.apellido }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Etapa Actual *</label>
                    <select name="etapa_actual_id" class="form-control" required>
                        {% for e in etapas %}
                        <option value="{{ e.etapa_id }}" {% if form_data and form_data.get('etapa_actual_id') == (e.etapa_id|string) %}selected{% endif %}>{{ e.nombre_etapa }} ({{ e.porcentaje_cierre }}%)</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Fecha Inicio *</label>
                    <input type="date" name="fecha_inicio" class="form-control" value="{{ form_data.get('fecha_inicio', '') if form_data else '' }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Fecha Cierre Planificada *</label>
                    <input type="date" name="fecha_cierre_planificada" class="form-control" value="{{ form_data.get('fecha_cierre_planificada', '') if form_data else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Monto Potencial (Q) *</label>
                    <input type="number" step="0.01" name="monto_potencial" class="form-control" value="{{ form_data.get('monto_potencial', '') if form_data else '' }}" required>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-custom"><i class="fas fa-save"></i> Guardar</button>
                <a href="{{ url_for('oportunidades') }}" class="btn btn-secondary btn-custom">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
